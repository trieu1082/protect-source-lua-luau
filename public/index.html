<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lua Protect Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {background:linear-gradient(135deg,#0f172a 0%,#1e1b2e 100%);}
.card{backdrop-filter:blur(10px);background:rgba(30,41,59,0.7);border:1px solid rgba(255,255,255,0.1);}
</style>
</head>
<body class="text-gray-200 min-h-screen">
<div class="container mx-auto px-4 py-8 max-w-5xl">
<h1 class="text-5xl font-bold text-center mb-6 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">Lua Protect</h1>

<div class="grid md:grid-cols-2 gap-6">
<div class="card rounded-2xl p-6 shadow-xl">
<h2 class="text-2xl font-semibold mb-4">📤 Upload Script</h2>
<form id="uploadForm">
<textarea id="scriptContent" rows="10" class="w-full p-3 bg-gray-900 rounded-lg border border-gray-700 text-gray-200 font-mono text-sm" placeholder="Paste Lua/Luau code here"></textarea>
<button type="submit" class="mt-4 w-full bg-green-600 hover:bg-green-700 py-2 rounded-lg font-semibold">🔒 Protect & Get Link</button>
</form>
<div id="uploadResult" class="mt-4 text-sm hidden"></div>
</div>

<div class="card rounded-2xl p-6 shadow-xl">
<h2 class="text-2xl font-semibold mb-4">📜 Scripts</h2>
<button id="refreshList" class="mb-3 text-sm bg-gray-700 px-3 py-1 rounded hover:bg-gray-600">⟳ Refresh</button>
<div id="scriptsList" class="max-h-96 overflow-y-auto space-y-2"><p class="text-gray-500 text-center">No scripts yet</p></div>
</div>
</div>
</div>

<script>
async function uploadScript(){
const content=document.getElementById('scriptContent').value
if(!content.trim()) return alert('Enter Lua code!')
const btn=event.target;btn.disabled=true;btn.innerHTML='⏳ Processing...'
try{
const res=await fetch('/upload',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content})})
const data=await res.json()
const div=document.getElementById('uploadResult')
if(data.loader){div.innerHTML=`✅ Loader: <code class="bg-gray-800 p-1 rounded break-all">${data.loader}</code>`;div.classList.remove('hidden');refreshScripts();document.getElementById('scriptContent').value=''}else{div.innerHTML='❌ Error';div.classList.remove('hidden')}
}catch(err){alert('Server error')}finally{btn.disabled=false;btn.innerHTML='🔒 Protect & Get Link'}
}

async function refreshScripts(){
const listDiv=document.getElementById('scriptsList');listDiv.innerHTML='<p class="text-gray-500">Loading...</p>'
try{const res=await fetch('/scripts');const data=await res.json()
if(data.scripts&&data.scripts.length){listDiv.innerHTML=data.scripts.map(s=>`<div class="bg-gray-800/50 p-2 rounded flex justify-between items-center"><span class="truncate font-mono">${s.id}</span><button onclick="copyToClipboard('${s.loadUrl}')" class="bg-blue-600 px-2 py-1 rounded text-xs">📋 Copy</button></div>`).join('')}else{listDiv.innerHTML='<p class="text-gray-500 text-center">No scripts</p>'}}catch(err){listDiv.innerHTML='<p class="text-red-400">Error loading</p>'}
}

function copyToClipboard(text){navigator.clipboard.writeText(text);alert('Copied!')}

document.getElementById('uploadForm').addEventListener('submit',e=>{e.preventDefault();uploadScript()})
document.getElementById('refreshList').addEventListener('click',refreshScripts)
refreshScripts()
</script>
</body>
</html>
